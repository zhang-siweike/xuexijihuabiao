 '6':[{n:1,a:'分数巧算技巧'},{n:2,a:'分数裂项方法'},{n:3,a:'分数的应用【初步】'},{n:4,a:'百分数的应用综合'},{n:5,a:'比例的应用综合'},{n:6,a:'比例的应用综合'},{n:7,a:'圆的周长与面积【初步】'},{n:8,a:'圆的周长与面积【进阶】'},{n:9,a:'组合图形的面积【进阶】'},{n:10,a:'圆柱与圆锥的表面积'},{n:11,a:'圆柱与圆锥的体积'},{n:12,a:'分数的应用【进阶】'},{n:13,a:'工程问题综合'},{n:14,a:'进水出水问题'},{n:15,a:'经济与折扣问题'},{n:16,a:'利率与纳税问题'},{n:17,a:'正反比例解行程问题'},{n:18,a:'统计图表【进阶】'},{n:19,a:'排列组合【初步】'},{n:20,a:'排列组合【进阶】'},{n:21,a:'钟面上的行程问题'},{n:22,a:'最不利原则'},{n:23,a:'风筝模型与蝴蝶模型'},{n:24,a:'燕尾模型'},{n:25,a:'鸟头模型'},{n:26,a:'金字塔模型'},{n:27,a:'沙漏模型'}]
};
var H = ['2026-01-01','2026-02-15','2026-02-16','2026-02-17','2026-02-18','2026-04-04','2026-04-05','2026-05-01','2026-05-02','2026-05-03','2026-06-19','2026-09-25','2026-10-01','2026-10-02','2026-10-03'];
var G='1', V='list', S={}, gifts=[], F='all', MP={}, PrintSel={}, redeems={};

function pD(s){ var p=s.split('-'); return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); }
function fD(d){ var y=d.getFullYear(); var m=d.getMonth()+1; var da=d.getDate(); return y+'-'+(m<10?'0'+m:m)+'-'+(da<10?'0'+da:da); }
function iW(d){ return d.getDay()===0||d.getDay()===6; }
function iH(d){ return H.indexOf(fD(d))!==-1; }
function iS(d,w,h){ return (w&&iW(d))||(h&&iH(d)); }
function fV(d,w,h){ var c=new Date(d),i=0; while(iS(c,w,h)&&i<3000){c.setDate(c.getDate()+1);i++;} return c; }
function cS(s,e,w,h){ var c=0,cur=new Date(s); while(cur<=e){if(!iS(cur,w,h))c++;cur.setDate(cur.getDate()+1);} return c; }
function aS(s,d,w,h){ var c=new Date(s),cnt=0,i=0; while(cnt<d&&i<5000){if(!iS(c,w,h)){cnt++;if(cnt>=d)break;}c.setDate(c.getDate()+1);i++;} return new Date(c); }

function init(g){
    if(!S[g]||!Array.isArray(S[g])){
        var t=D[g], a=[];
        for(var i=0;i<t.length;i++) a.push({d:7, s:'none', p:0, ex:false, customStart:null, customDays:null});
        S[g]=a;
    } else {
        for(var i=0;i<S[g].length;i++){
            if(S[g][i].customStart===undefined) S[g][i].customStart=null;
            if(S[g][i].customDays===undefined) S[g][i].customDays=null;
        }
    }
    if(!PrintSel[g]) PrintSel[g]={};
    for(var i=0;i<D[g].length;i++) if(PrintSel[g][i]===undefined) PrintSel[g][i]=false;
    if(!redeems[g]) redeems[g]={};
    return S[g];
}

function calc(g){
    var st=init(g), w=document.getElementById('sw').checked, h=document.getElementById('sh').checked;
    var ss=document.getElementById('sd').value||'2026-03-23';
    var s=pD(ss); if(isNaN(s.getTime())) s=new Date();
    s=fV(s,w,h);
    var t=D[g], sch=[], cur=new Date(s);
    for(var i=0;i<t.length;i++){
        var sti = st[i];
        var startDate;
        if(sti.customStart){
            startDate = pD(sti.customStart);
            startDate = fV(startDate, w, h);
        } else { startDate = new Date(cur); }
        var daysNeeded = (sti.customDays !== null) ? sti.customDays : (parseInt(document.getElementById('dd').value) || 7);
        var end = aS(startDate, daysNeeded, w, h);
        var dds=[], dc=new Date(startDate), cnt=0;
        while(cnt<daysNeeded){ 
            if(!iS(dc,w,h)){dds.push({date:new Date(dc),dn:cnt+1});cnt++;} 
            dc.setDate(dc.getDate()+1); 
        }
        sch.push({i:i, start:new Date(startDate), end:new Date(end), days:daysNeeded, dds:dds});
        var nx=new Date(end); nx.setDate(nx.getDate()+1);
        cur = fV(nx, w, h);
    }
    return sch;
}

function updatePointsUI() {
    var st = S[G];
    if(!st) return;
    var rawTotal = 0;
    for(var i=0;i<st.length;i++) rawTotal += (st[i].p || 0);
    var gradeRedeem = redeems[G] || {};
    var redeemedTotal = 0;
    for(var id in gradeRedeem) redeemedTotal += gradeRedeem[id].cost;
    var available = rawTotal - redeemedTotal;
    if(available < 0) available = 0;
    document.getElementById('tp').textContent = available;
    document.getElementById('tp2').textContent = available;
    var rc=0; for(var i=0;i<st.length;i++){if(st[i].s=='review')rc++;}
    document.getElementById('rc').textContent=rc;
}

function rG(){ 
    var el=document.getElementById('gl'); if(!el) return;
    var gradeRedeem = redeems[G] || {}, h='';
    for(var i=0;i<gifts.length;i++){
        var gft = gifts[i]; var isRedeemed = !!gradeRedeem[gft.id];
        var cls = isRedeemed ? 'gift-tag redeemed' : 'gift-tag';
        h+='<span class="'+cls+'" data-id="'+gft.id+'" data-cost="'+gft.cost+'" data-name="'+escapeHtml(gft.name)+'">';
        h+= gft.name + '('+gft.cost+'分)';
        h+= '<span class="del" data-delid="'+gft.id+'" onclick="event.stopPropagation(); deG(\''+gft.id+'\')">×</span>';
        if(!isRedeemed) h+= ' <span style="font-size:0.65rem;">🔘</span>';
        else h+= ' ✅已兑';
        h+='</span>';
    }
    el.innerHTML = h;
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }

function redeemGift(giftId, cost, name) {
    var st = S[G]; if(!st) return false;
    var rawTotal = 0; for(var i=0;i<st.length;i++) rawTotal += (st[i].p || 0);
    var gradeRedeem = redeems[G] || {}, used = 0;
    for(var k in gradeRedeem) used += gradeRedeem[k].cost;
    var available = rawTotal - used;
    if(gradeRedeem[giftId]) { alert('这个礼物已经兑换过了！'); return false; }
    if(available < cost) { alert('积分不足！当前可用积分:'+available+', 需要'+cost); return false; }
    if(!confirm(`确定用 ${cost} 积分兑换 “${name}” 吗？`)) return false;
    if(!redeems[G]) redeems[G]={};
    redeems[G][giftId] = { cost: cost, name: name, ts: Date.now() };
    save(); updatePointsUI(); rG(); render();
    return true;
}

function adG(){ 
    var n=document.getElementById('gn').value.trim(); 
    var c=parseInt(document.getElementById('gc').value); 
    if(!n||isNaN(c)||c<=0)return alert('请填写礼物名称和正数积分');
    var newId = Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    gifts.push({id:newId, name:n, cost:c});
    document.getElementById('gn').value=''; document.getElementById('gc').value=''; 
    save(); rG(); 
}

function deG(giftId){
    if(!confirm('删除礼物后，所有年级兑换记录也会被移除，确定吗？')) return;
    gifts = gifts.filter(function(g){ return g.id != giftId; });
    for(var grd in redeems) { if(redeems[grd] && redeems[grd][giftId]) delete redeems[grd][giftId]; }
    save(); rG(); updatePointsUI(); render();
}

function clP(){
    if(!confirm('⚠️ 将清空当前年级所有专题的积分，并清除所有已兑换礼物记录 (仅当前年级)！确定吗？')) return;
    var st=S[G]; if(st) for(var i=0;i<st.length;i++) st[i].p=0;
    if(redeems[G]) redeems[G]={};
    save(); render(); updatePointsUI(); rG();
}

function togglePrint(g,i,val){ if(!PrintSel[g]) PrintSel[g]={}; PrintSel[g][i]=val; save(); render(); }
function tMP(k,v){ MP[k]=v; save(); }
function edT(g,i){
    var st=S[g]; if(!st) return;
    var w=document.getElementById('sw').checked, h=document.getElementById('sh').checked;
    var sch=calc(g); if(!sch[i]) return;
    var cs=sch[i].start, ce=sch[i].end;
    var ns=prompt('开始日期 (YYYY-MM-DD)',fD(cs)); if(!ns) return;
    var ne=prompt('结束日期 (YYYY-MM-DD)',fD(ce)); if(!ne) return;
    var nst=pD(ns), nend=pD(ne); if(isNaN(nst)||isNaN(nend)){alert('日期格式错误');return;}
    nst=fV(nst,w,h); nend=fV(nend,w,h);
    if(nend<nst){alert('结束不能早于开始');return;}
    var nd=cS(nst,nend,w,h); if(nd<1){alert('没有学习日');return;}
    if(!confirm('重新排期？')) return;
    st[i].customStart = fD(nst); st[i].customDays = nd; render();
}
function tgE(g,i){ S[g][i].ex=!S[g][i].ex; render(); }
function cyS(g,i){ var o=['none','review','done']; var c=S[g][i].s; S[g][i].s=o[(o.indexOf(c)+1)%3]; render(); }
function upP(g,i,v){ S[g][i].p=Math.max(0,parseInt(v)||0); render(); }
function seF(f,btn){ F=f; var fbs=document.querySelectorAll('.filter-btn'); for(var i=0;i<fbs.length;i++)fbs[i].classList.remove('active'); btn.classList.add('active'); render(); }
function swV(v,el){ V=v; var vbs=document.querySelectorAll('.view-btn'); for(var i=0;i<vbs.length;i++)vbs[i].classList.remove('active'); el.classList.add('active'); render(); }
function swG(g,el){ G=g; var tabs=document.querySelectorAll('.grade-tab'); for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active'); el.classList.add('active'); F='all'; var fbs=document.querySelectorAll('.filter-btn'); for(var j=0;j<fbs.length;j++)fbs[j].classList.toggle('active',j===0); render(); rG(); updatePointsUI(); }
function resetAllCustom(){ var st = S[G]; if(st) for(var i=0;i<st.length;i++){ st[i].customStart = null; st[i].customDays = null; } render(); }

function rL(){
    var el=document.getElementById('lc'); if(!el) return;
    init(G); var st=S[G], t=D[G], sch=calc(G);
    var h='', vis=0;
    for(var i=0;i<sch.length;i++){
        var it=st[i]; if(!it) continue;
        if(F==='review'&&it.s!=='review') continue;
        if(F==='done'&&it.s!=='done') continue;
        vis++;
        var ss=fD(sch[i].start), ee=fD(sch[i].end);
        var txt='⚪标记', cls='';
        if(it.s==='review'){txt='🔴需巩固';cls='review';}
        if(it.s==='done'){txt='✅完成';cls='done';}
        var tn=t[i].n;
        var printChecked = (PrintSel[G] && PrintSel[G][i]) ? true : false;
        h+='<div class="topic-card '+(it.s==='review'?'review':'')+' '+(it.s==='done'?'done-hidden':'')+'">';
        h+='<div class="date-row" onclick="edT(\''+G+'\','+i+')"><span>📆 '+ss+' — '+ee+'</span><label class="print-check-label" onclick="event.stopPropagation()"><input type="checkbox" '+(printChecked?'checked':'')+' onchange="togglePrint(\''+G+'\','+i+',this.checked)"> 🖨️打印</label></div>';
        h+='<div class="topic-title" onclick="tgE(\''+G+'\','+i+')"><span class="topic-num">'+tn+'</span><span class="topic-name-text">专题'+tn+' '+t[i].a+'</span><button class="status-btn '+cls+'" onclick="event.stopPropagation();cyS(\''+G+'\','+i+')">'+txt+'</button><div class="points-wrapper" onclick="event.stopPropagation()"><span class="points-label">⭐积分</span><input class="points-input" type="number" value="'+(it.p||0)+'" min="0" onchange="upP(\''+G+'\','+i+',this.value)"></div></div>';
        if(it.ex){
            h+='<div class="detail-panel"><div class="step"><span class="step-num">第一步：</span>观看视频并完成专题'+tn+'的课本并订正</div><div class="step"><span class="step-num">第二步：</span>独立完成专题'+tn+'的思维卷并对照视频纠错，用红笔订正</div><div class="step"><span class="step-num">第三步：</span>复习巩固错题</div></div>';
        }
        h+='</div>';
    }
    if(vis===0) h='<div style="text-align:center;padding:30px;color:#94a3b8;">📭 没有符合条件的专题</div>';
    el.innerHTML=h;
    document.getElementById('fc').textContent='显示'+vis+'个';
    updatePointsUI();
}

function rC(){
    var el=document.getElementById('cc'); if(!el) return;
    init(G); var sch=calc(G);
    var map={};
    for(var i=0;i<sch.length;i++){
        var s=sch[i], tn=D[G][i].n;
        for(var d=0;d<s.dds.length;d++){
            var ds=fD(s.dds[d].date);
            if(!map[ds]) map[ds]=[];
            map[ds].push({t:'专题'+tn, c:'tc-'+tn});
        }
    }
    var dates=Object.keys(map).sort();
    if(dates.length===0){ el.innerHTML='<div style="text-align:center;padding:30px;">暂无学习计划</div>'; return; }
    var min=pD(dates[0]), max=pD(dates[dates.length-1]);
    var months=[], cur=new Date(min.getFullYear(),min.getMonth(),1);
    while(cur<=max){ months.push({y:cur.getFullYear(),m:cur.getMonth()+1}); cur.setMonth(cur.getMonth()+1); }
    var wds=['日','一','二','三','四','五','六'], h='';
    for(var m=0;m<months.length;m++){
        var y=months[m].y, mo=months[m].m;
        var mk=y+'-'+(mo<10?'0'+mo:mo);
        if(MP[mk]===undefined) MP[mk]=false;
        var fd_=new Date(y,mo-1,1), ld=new Date(y,mo,0);
        var sdow=fd_.getDay(), td=ld.getDate();
        h+='<div class="month-box"><div class="month-box-title"><span>'+y+'年'+mo+'月</span><label style="font-size:0.65rem;"><input class="month-print-cb" type="checkbox" data-monthkey="'+mk+'" '+(MP[mk]?'checked':'')+' onchange="tMP(\''+mk+'\',this.checked)">打印</label></div>';
        h+='<table class="month-table"><thead><tr>';
        for(var w=0;w<7;w++) h+='<th>'+wds[w]+'</th>';
        h+='</thead><tbody><tr>';
        for(var c=0;c<sdow;c++) h+='<td class="empty"></td>';
        var cc=sdow;
        for(var da=1;da<=td;da++){
            if(cc>0 && cc%7===0) h+='</tr><tr>';
            var ds=y+'-'+(mo<10?'0'+mo:mo)+'-'+(da<10?'0'+da:da);
            var tasks=map[ds]||[];
            h+='<td class="'+(tasks.length===0?'empty':'')+'">';
            h+='<span class="day-num">'+da+'</span>';
            for(var t=0;t<tasks.length;t++){
                h+='<span class="task-dot '+tasks[t].c+'">'+tasks[t].t+'</span>';
            }
            h+='</td>';
            cc++;
        }
        while(cc%7!==0){ h+='<td class="empty"></td>'; cc++; }
        h+='</tr></tbody></table></div>';
    }
    el.innerHTML=h;
    updatePointsUI();
}

function render(){
    if(V==='list'){ document.getElementById('lc').style.display='flex'; document.getElementById('cc').style.display='none'; rL(); }
    else { document.getElementById('lc').style.display='none'; document.getElementById('cc').style.display='flex'; rC(); }
    save();
}

function save(){ 
    try{ 
        localStorage.setItem('mp_gs',JSON.stringify(S)); 
        localStorage.setItem('mp_gf',JSON.stringify(gifts)); 
        localStorage.setItem('mp_v',V); 
        localStorage.setItem('mp_mp',JSON.stringify(MP)); 
        localStorage.setItem('mp_ps',JSON.stringify(PrintSel));
        localStorage.setItem('mp_redeems',JSON.stringify(redeems));
    }catch(e){} 
}

function load(){ 
    try{ 
        var gs=localStorage.getItem('mp_gs'); if(gs)S=JSON.parse(gs); 
        var gf=localStorage.getItem('mp_gf'); if(gf)gifts=JSON.parse(gf); 
        var v=localStorage.getItem('mp_v'); if(v)V=v; 
        MP = {};
        var ps=localStorage.getItem('mp_ps'); if(ps)PrintSel=JSON.parse(ps);
        var rd=localStorage.getItem('mp_redeems'); if(rd) redeems=JSON.parse(rd);
        else redeems={};
        if(gifts.length && gifts[0] && !gifts[0].id) {
            gifts = gifts.map(function(g,idx){ return { id: 'legacy_'+Date.now()+'_'+idx, name: g.name, cost: g.cost }; });
        }
        for(var gk in S) if(!redeems[gk]) redeems[gk]={};
    }catch(e){} 
    init(G); 
}

function printPlan(){
    if(V==='list'){
        var cards = document.querySelectorAll('#lc .topic-card');
        var originalDisplay = [];
        for(var i=0;i<cards.length;i++){
            originalDisplay.push(cards[i].style.display);
            var cb = cards[i].querySelector('.print-check-label input');
            if(cb && !cb.checked) cards[i].style.display = 'none';
        }
        setTimeout(function(){
            window.print();
            setTimeout(function(){ for(var j=0;j<cards.length;j++) cards[j].style.display = originalDisplay[j] || ''; render(); },300);
        },150);
    } else {
        var secs=document.querySelectorAll('#cc .month-box');
        var keys=Object.keys(MP);
        for(var m=0;m<secs.length;m++){ if(keys[m]&&!MP[keys[m]]) secs[m].style.display='none'; }
        setTimeout(function(){ window.print(); setTimeout(function(){ for(var n=0;n<secs.length;n++)secs[n].style.display=''; render(); },300); },150);
    }
}

document.getElementById('gl') && document.getElementById('gl').addEventListener('click', function(e) {
    var target = e.target.closest('.gift-tag');
    if(!target) return;
    if(target.classList.contains('redeemed')) { e.stopPropagation(); return; }
    var delBtn = e.target.closest('.del');
    if(delBtn) return;
    var giftId = target.getAttribute('data-id');
    var cost = parseInt(target.getAttribute('data-cost'));
    var name = target.getAttribute('data-name');
    if(giftId && !isNaN(cost)) {
        e.stopPropagation();
        redeemGift(giftId, cost, name);
    }
});

load(); init(G); render(); rG(); updatePointsUI();
</script>
